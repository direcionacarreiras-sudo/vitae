<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direciona Carreira</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #faf6f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 40px;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -100px; left: -100px;
    width: 380px; height: 380px;
    background: radial-gradient(circle, #e8d4b044 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: 40px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, #d4a96a22 0%, transparent 70%);
    pointer-events: none;
  }

  .deco-line {
    width: 1px; height: 28px;
    background: linear-gradient(180deg, transparent, #c9a96e88, transparent);
    margin: 0 auto 24px;
  }

  .avatar-ring {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b8894a, #e8c882, #b8894a);
    padding: 2px;
    margin-bottom: 16px;
  }

  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #faf6f0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 600;
    color: #b8894a; letter-spacing: 1px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 600;
    color: #2c2015; letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .brand-name span { color: #b8894a; }

  .bio-tag {
    font-size: 11px; font-weight: 400;
    color: #b8894a; letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .bio-desc {
    font-size: 14px; color: #7a6248;
    text-align: center; line-height: 1.7;
    max-width: 280px; margin-bottom: 28px;
    font-weight: 300;
  }

  .divider {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
    margin: 0 auto 28px;
  }

  .links-container {
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex; align-items: center;
    gap: 14px; padding: 16px 20px;
    border-radius: 16px;
    border: 1px solid #e8d9c4;
    background: #ffffff;
    cursor: pointer; text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 1px 6px #c9a96e12;
  }

  .link-btn:hover {
    border-color: #c9a96e;
    box-shadow: 0 4px 16px #c9a96e22;
    transform: translateY(-1px);
  }

  .link-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .icon-linkedin { background: #e8f0fb; }
  .icon-whatsapp { background: #e6f7ed; }
  .icon-tiktok { background: #f2eef8; }

  .link-text { flex: 1; }

  .link-label {
    font-size: 11px; color: #b09980;
    letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 400; display: block; margin-bottom: 2px;
  }

  .link-title {
    font-size: 15px; color: #2c2015;
    font-weight: 500; display: block;
  }

  .arrow { color: #c9a96e; font-size: 18px; }

  .footer-text {
    margin-top: 40px;
    font-size: 11px; color: #c9bfb0;
    letter-spacing: 2.5px; text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="deco-line"></div>

<div class="avatar-ring">
  <div class="avatar-inner">VC</div>
</div>

<p class="brand-name">Vitae <span>o seu currículo</span></p>
<p class="bio-tag">Consultoria de Carreira</p>
<p class="bio-desc">Mentoria de carreira & gestão de perfil LinkedIn para executivos que querem se posicionar de verdade.</p>

<div class="divider"></div>

<div class="links-container">

  <a class="link-btn" href="https://www.linkedin.com/in/cristianerodriguess" target="_blank">
    <div class="link-icon icon-linkedin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect width="20" height="20" rx="4" fill="#0A66C2" x="2" y="2"/>
        <path d="M7.5 10v7M7.5 7.5v.01M11 17v-4a2 2 0 0 1 4 0v4M11 10v7" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="link-text">
      <span class="link-label">Conecte-se</span>
      <span class="link-title">LinkedIn</span>
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="link-btn" href="https://wa.link/fszivv" target="_blank">
    <div class="link-icon icon-whatsapp">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.1-1.35A9.96 9.96 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#25D366"/>
        <path d="M9 8.5c.2.5 1.1 2.2 1.2 2.4.1.2 0 .4-.1.5l-.5.5c-.1.1-.1.2 0 .3.4.6 1 1.3 1.7 1.8.6.4 1.2.7 1.4.8.2.1.3 0 .4-.1l.5-.6c.1-.1.3-.2.4-.1.2.1 1.8 1 2.1 1.1.1.1.1.4 0 .7-.2.7-1.2 1.3-1.8 1.3-1.4.1-3.3-.7-5.2-3-.9-1.1-1.4-2.4-1.4-3.3 0-.7.5-1.6 1-1.9.3-.2.5-.1.6.1z" fill="#fff"/>
      </svg>
    </div>
    <div class="link-text">
      <span class="link-label">Fale comigo</span>
      <span class="link-title">WhatsApp</span>
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="link-btn" href="https://www.tiktok.com/@cristianerodriguesrh" target="_blank">
    <div class="link-icon icon-tiktok">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect width="20" height="20" rx="4" fill="#010101" x="2" y="2"/>
        <path d="M14 8.5a3 3 0 0 0 3 2.5v-2a1 1 0 0 1-1-1V7h-2v6.5a1.5 1.5 0 1 1-1.5-1.5v-2A3.5 3.5 0 1 0 16 13.5V8.5h-2z" fill="#fff"/>
      </svg>
    </div>
    <div class="link-text">
      <span class="link-label">Me siga</span>
      <span class="link-title">TikTok</span>
    </div>
    <span class="arrow">→</span>
  </a>

</div>

<p class="footer-text">vitae o seu currículo</p>

</body>
</html>
